<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  /* ============ Base & Reset ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #eef2ff;
    --panel: #ffffff;
    --border: #e3e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --danger: #ef4444;
    --success: #10b981;
    --shadow: 0 8px 28px rgba(79, 70, 229, .10);
    --radius: 14px;

    --r-primary: #6366f1;
    --r-secondary: #0f172a;
    --r-accent: #e0e7ff;
    --r-text: #1f2937;
    --r-muted: #4b5563;
    --r-bg: #ffffff;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(900px 500px at -10% -10%, #c7d2fe 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #fbcfe8 0%, transparent 55%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ Layout ============ */
  .app {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) 1fr;
    gap: 24px;
    padding: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .form-panel { display: flex; flex-direction: column; }
  .preview-panel {
    background: #eceff5;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 24px;
    align-self: start;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
  }

  /* ============ Form ============ */
  .form-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .form-header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .form-header h1 i { color: var(--primary); }
  .form-body { padding: 20px 24px; overflow-y: auto; }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: .8rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: .9rem;
    background: #fafbfd;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .field input:hover, .field textarea:hover { border-color: #c9d3e2; }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
  }
  .field textarea { resize: vertical; min-height: 90px; }

  .entry {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
    background: #fafbfd;
    position: relative;
  }
  .entry .remove-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: .85rem;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .15s;
  }
  .entry .remove-btn:hover { background: rgba(239, 68, 68, .1); }

  /* ============ Buttons ============ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font-family: inherit;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { background: #f1f5f9; border-color: #c9d3e2; }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
  .btn-ghost { background: transparent; border-style: dashed; color: var(--primary); border-color: #c9d3e2; }
  .btn-ghost:hover { background: rgba(37, 99, 235, .06); border-color: var(--primary); }
  .btn-danger { background: #fff; color: var(--danger); border-color: #fecaca; }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 6px 10px; font-size: .8rem; }

  /* ============ Preview toolbar ============ */
  .toolbar {
    width: 100%;
    max-width: 820px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
  }
  .toolbar-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar-label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .theme-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px var(--border);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .theme-swatch:hover { transform: scale(1.08); }
  .theme-swatch.active { box-shadow: 0 0 0 2px var(--primary); transform: scale(1.08); }

  /* ============ Resume (A4) ============ */
  .resume-wrap {
    width: 100%;
    max-width: 820px;
    display: flex;
    justify-content: center;
  }
  .resume {
    width: 100%;
    max-width: 794px;          /* ~A4 width @ 96dpi */
    min-height: 1123px;        /* ~A4 height */
    background: var(--r-bg);
    color: var(--r-text);
    padding: 56px 60px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, .12);
    font-size: 14px;
    line-height: 1.55;
  }
  .resume .placeholder { color: #cbd5e1; font-style: italic; }

  .r-header {
    border-bottom: 3px solid var(--r-primary);
    padding-bottom: 18px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .r-photo {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--r-accent);
    box-shadow: 0 6px 18px rgba(15,23,42,.15);
    flex-shrink: 0;
  }
  .r-header-text { flex: 1; min-width: 0; }
  .r-name {
    font-size: 2.2em;
    font-weight: 800;
    color: var(--r-secondary);
    letter-spacing: -.02em;
    line-height: 1.1;
  }
  .r-title {
    font-size: 1.05em;
    color: var(--r-primary);
    font-weight: 600;
    margin-top: 4px;
  }
  .r-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 18px;
    margin-top: 12px;
    font-size: .88em;
    color: var(--r-muted);
  }
  .r-contact span { display: inline-flex; align-items: center; gap: 6px; }
  .r-contact i { color: var(--r-primary); }

  /* Photo upload UI */
  .photo-upload {
    display: flex; align-items: center; gap: 14px;
    padding: 12px; border: 1px dashed #c9d3e2; border-radius: 10px;
    background: #fafbfd;
  }
  .photo-preview {
    width: 64px; height: 64px; border-radius: 50%;
    background: #e0e7ff center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    color: var(--primary); font-size: 1.4rem; flex-shrink: 0;
    border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border);
  }
  .photo-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  #photoInput { display: none; }

  .r-section { margin-bottom: 22px; }
  .r-section h2 {
    font-size: .95em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--r-primary);
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--r-accent);
  }
  .r-summary { color: var(--r-muted); }

  .r-entry { margin-bottom: 14px; }
  .r-entry-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .r-entry-title { font-weight: 700; color: var(--r-secondary); font-size: 1em; }
  .r-entry-sub { color: var(--r-primary); font-weight: 500; font-size: .92em; }
  .r-entry-date { color: var(--r-muted); font-size: .82em; font-weight: 500; white-space: nowrap; }
  .r-entry-desc { margin-top: 6px; color: var(--r-muted); }
  .r-entry-desc ul { padding-left: 18px; }
  .r-entry-desc li { margin-bottom: 3px; }

  .r-skills { display: flex; flex-wrap: wrap; gap: 6px; }
  .r-skill {
    background: var(--r-accent);
    color: var(--r-secondary);
    padding: 4px 12px;
    border-radius: 999px;
    font-size: .82em;
    font-weight: 500;
  }

  /* ============ Responsive ============ */
  @media (max-width: 1024px) {
    .app { grid-template-columns: 1fr; }
    .preview-panel { position: static; max-height: none; }
  }
  @media (max-width: 640px) {
    .app { padding: 12px; gap: 12px; }
    .form-body, .form-header { padding: 16px; }
    .grid-2 { grid-template-columns: 1fr; }
    .resume { padding: 32px 24px; min-height: auto; }
    .r-name { font-size: 1.7em; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ============ FORM PANEL ============ -->
  <section class="panel form-panel">
    <header class="form-header">
      <h1><i class="fa-solid fa-file-lines"></i> Resume Builder</h1>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-danger btn-sm" id="resetBtn"><i class="fa-solid fa-rotate-left"></i> Reset</button>
        <button class="btn btn-primary btn-sm" id="downloadBtn"><i class="fa-solid fa-download"></i> PDF</button>
      </div>
    </header>

    <div class="form-body">

      <!-- Personal -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-user"></i> Personal Info</div>

        <div class="field">
          <label>Profile Picture</label>
          <div class="photo-upload">
            <div class="photo-preview" id="photoPreview"><i class="fa-solid fa-user"></i></div>
            <div class="photo-actions">
              <label for="photoInput" class="btn btn-sm"><i class="fa-solid fa-upload"></i> Upload</label>
              <button type="button" class="btn btn-sm btn-danger" id="removePhoto"><i class="fa-solid fa-xmark"></i> Remove</button>
              <input type="file" id="photoInput" accept="image/*"/>
            </div>
          </div>
        </div>

        <div class="field"><label>Full Name</label><input type="text" id="fullName" placeholder="Jane Doe"/></div>
        <div class="field"><label>Job Title / Tagline</label><input type="text" id="jobTitle" placeholder="Senior Product Designer"/></div>
        <div class="grid-2">
          <div class="field"><label>Email</label><input type="email" id="email" placeholder="jane@example.com"/></div>
          <div class="field"><label>Phone</label><input type="tel" id="phone" placeholder="+1 555 123 4567"/></div>
        </div>
        <div class="field"><label>Address / Location</label><input type="text" id="address" placeholder="San Francisco, CA"/></div>
      </div>

      <!-- Summary -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-align-left"></i> Profile Summary</div>
        <div class="field"><textarea id="summary" placeholder="A short paragraph about yourself, your strengths, and what you're looking for."></textarea></div>
      </div>

      <!-- Experience -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-briefcase"></i> Work Experience</div>
        <div id="experienceList"></div>
        <button class="btn btn-ghost" id="addExperience"><i class="fa-solid fa-plus"></i> Add Experience</button>
      </div>

      <!-- Education -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-graduation-cap"></i> Education</div>
        <div id="educationList"></div>
        <button class="btn btn-ghost" id="addEducation"><i class="fa-solid fa-plus"></i> Add Education</button>
      </div>

      <!-- Skills -->
      <div class="section">
        <div class="section-title"><i class="fa-solid fa-bolt"></i> Skills</div>
        <div class="field">
          <label>Comma-separated skills</label>
          <input type="text" id="skills" placeholder="JavaScript, Figma, Leadership, Python"/>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ PREVIEW PANEL ============ -->
  <section class="preview-panel">
    <div class="toolbar">
      <div class="toolbar-group">
        <span class="toolbar-label">Theme</span>
        <div class="theme-swatch active" data-theme="indigo"  style="background:linear-gradient(135deg,#6366f1,#a855f7)" title="Indigo Violet"></div>
        <div class="theme-swatch"        data-theme="rose"    style="background:linear-gradient(135deg,#e11d48,#f97316)" title="Sunset Rose"></div>
        <div class="theme-swatch"        data-theme="teal"    style="background:linear-gradient(135deg,#0d9488,#06b6d4)" title="Ocean Teal"></div>
        <div class="theme-swatch"        data-theme="gold"    style="background:#b8860b" title="Elegant Gold"></div>
        <div class="theme-swatch"        data-theme="dark"    style="background:#111827" title="Midnight Dark"></div>
        <div class="theme-swatch"        data-theme="emerald" style="background:#059669" title="Fresh Emerald"></div>
      </div>
      <div class="toolbar-group">
        <span class="toolbar-label">Font</span>
        <button class="btn btn-sm" id="fontDown"><i class="fa-solid fa-minus"></i></button>
        <span id="fontSizeLabel" style="font-size:.85rem;color:var(--muted);min-width:40px;text-align:center;">14px</span>
        <button class="btn btn-sm" id="fontUp"><i class="fa-solid fa-plus"></i></button>
      </div>
    </div>

    <div class="resume-wrap">
      <article class="resume" id="resume">
        <!-- Filled by JS -->
      </article>
    </div>
  </section>
</div>

<script>
/* ==========================================================
   Resume Builder — vanilla JS
   ========================================================== */

// ---------- State ----------
const state = {
  fullName: '',
  jobTitle: '',
  email: '',
  phone: '',
  address: '',
  summary: '',
  experiences: [],   // { id, title, company, start, end, desc }
  educations: [],    // { id, degree, institution, year }
  skills: '',
  theme: 'indigo',
  fontSize: 14,
  photo: '',
};

const THEMES = {
  indigo:  { '--r-primary': '#6366f1', '--r-secondary': '#1e1b4b', '--r-accent': '#e0e7ff', '--r-text': '#1f2937', '--r-muted': '#4b5563', '--r-bg': '#ffffff' },
  rose:    { '--r-primary': '#e11d48', '--r-secondary': '#4c0519', '--r-accent': '#ffe4e6', '--r-text': '#1f2937', '--r-muted': '#525252', '--r-bg': '#fffaf7' },
  teal:    { '--r-primary': '#0d9488', '--r-secondary': '#042f2e', '--r-accent': '#ccfbf1', '--r-text': '#1f2937', '--r-muted': '#475569', '--r-bg': '#ffffff' },
  gold:    { '--r-primary': '#b8860b', '--r-secondary': '#3b2f12', '--r-accent': '#fdf3d1', '--r-text': '#2c2415', '--r-muted': '#6b5a2e', '--r-bg': '#fffdf7' },
  dark:    { '--r-primary': '#a78bfa', '--r-secondary': '#f8fafc', '--r-accent': '#1e293b', '--r-text': '#e2e8f0', '--r-muted': '#94a3b8', '--r-bg': '#0f172a' },
  emerald: { '--r-primary': '#059669', '--r-secondary': '#064e3b', '--r-accent': '#d1fae5', '--r-text': '#1f2937', '--r-muted': '#4b5563', '--r-bg': '#ffffff' },
};

const uid = () => Math.random().toString(36).slice(2, 9);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const placeholder = (text) => `<span class="placeholder">${esc(text)}</span>`;

// ---------- Dynamic entries: Experience ----------
function renderExperienceForms() {
  const list = document.getElementById('experienceList');
  list.innerHTML = state.experiences.map(exp => `
    <div class="entry" data-id="${exp.id}">
      <button class="remove-btn" data-remove-exp="${exp.id}" title="Remove"><i class="fa-solid fa-trash"></i></button>
      <div class="field"><label>Job Title</label><input data-exp="${exp.id}" data-field="title" type="text" value="${esc(exp.title)}" placeholder="Product Designer"/></div>
      <div class="field"><label>Company</label><input data-exp="${exp.id}" data-field="company" type="text" value="${esc(exp.company)}" placeholder="Acme Inc."/></div>
      <div class="grid-2">
        <div class="field"><label>Start Date</label><input data-exp="${exp.id}" data-field="start" type="text" value="${esc(exp.start)}" placeholder="Jan 2022"/></div>
        <div class="field"><label>End Date</label><input data-exp="${exp.id}" data-field="end" type="text" value="${esc(exp.end)}" placeholder="Present"/></div>
      </div>
      <div class="field"><label>Description (one bullet per line)</label><textarea data-exp="${exp.id}" data-field="desc" placeholder="• Led redesign of...">${esc(exp.desc)}</textarea></div>
    </div>
  `).join('');
}

function renderEducationForms() {
  const list = document.getElementById('educationList');
  list.innerHTML = state.educations.map(ed => `
    <div class="entry" data-id="${ed.id}">
      <button class="remove-btn" data-remove-edu="${ed.id}" title="Remove"><i class="fa-solid fa-trash"></i></button>
      <div class="field"><label>Degree</label><input data-edu="${ed.id}" data-field="degree" type="text" value="${esc(ed.degree)}" placeholder="B.Sc. Computer Science"/></div>
      <div class="field"><label>Institution</label><input data-edu="${ed.id}" data-field="institution" type="text" value="${esc(ed.institution)}" placeholder="Stanford University"/></div>
      <div class="field"><label>Graduation Year</label><input data-edu="${ed.id}" data-field="year" type="text" value="${esc(ed.year)}" placeholder="2021"/></div>
    </div>
  `).join('');
}

// ---------- Render preview ----------
function renderPreview() {
  const resume = document.getElementById('resume');

  // Apply theme
  const theme = THEMES[state.theme];
  Object.entries(theme).forEach(([k, v]) => resume.style.setProperty(k, v));
  resume.style.fontSize = state.fontSize + 'px';

  // Skills tags
  const skillsArr = state.skills.split(',').map(s => s.trim()).filter(Boolean);

  // Experience HTML
  const expHTML = state.experiences.length ? state.experiences.map(e => {
    const bullets = e.desc.split('\n').map(l => l.replace(/^[\s•\-*]+/, '').trim()).filter(Boolean);
    return `
      <div class="r-entry">
        <div class="r-entry-head">
          <div>
            <div class="r-entry-title">${esc(e.title) || placeholder('Job Title')}</div>
            <div class="r-entry-sub">${esc(e.company) || placeholder('Company')}</div>
          </div>
          <div class="r-entry-date">${esc(e.start) || '—'} — ${esc(e.end) || 'Present'}</div>
        </div>
        ${bullets.length ? `<div class="r-entry-desc"><ul>${bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul></div>` : ''}
      </div>
    `;
  }).join('') : '';

  // Education HTML
  const eduHTML = state.educations.length ? state.educations.map(e => `
    <div class="r-entry">
      <div class="r-entry-head">
        <div>
          <div class="r-entry-title">${esc(e.degree) || placeholder('Degree')}</div>
          <div class="r-entry-sub">${esc(e.institution) || placeholder('Institution')}</div>
        </div>
        <div class="r-entry-date">${esc(e.year) || '—'}</div>
      </div>
    </div>
  `).join('') : '';

  resume.innerHTML = `
    <header class="r-header">
      <div class="r-name">${esc(state.fullName) || placeholder('Your Name')}</div>
      <div class="r-title">${esc(state.jobTitle) || placeholder('Your Job Title')}</div>
      <div class="r-contact">
        ${state.email   ? `<span><i class="fa-solid fa-envelope"></i> ${esc(state.email)}</span>` : ''}
        ${state.phone   ? `<span><i class="fa-solid fa-phone"></i> ${esc(state.phone)}</span>` : ''}
        ${state.address ? `<span><i class="fa-solid fa-location-dot"></i> ${esc(state.address)}</span>` : ''}
        ${!state.email && !state.phone && !state.address ? placeholder('Add contact info to display here') : ''}
      </div>
    </header>

    ${state.summary ? `
      <section class="r-section">
        <h2>Profile</h2>
        <p class="r-summary">${esc(state.summary)}</p>
      </section>` : ''}

    ${expHTML ? `
      <section class="r-section">
        <h2>Experience</h2>
        ${expHTML}
      </section>` : ''}

    ${eduHTML ? `
      <section class="r-section">
        <h2>Education</h2>
        ${eduHTML}
      </section>` : ''}

    ${skillsArr.length ? `
      <section class="r-section">
        <h2>Skills</h2>
        <div class="r-skills">
          ${skillsArr.map(s => `<span class="r-skill">${esc(s)}</span>`).join('')}
        </div>
      </section>` : ''}
  `;
}

// ---------- Event wiring ----------
function bindStaticInputs() {
  ['fullName','jobTitle','email','phone','address','summary','skills'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      state[id] = e.target.value;
      renderPreview();
    });
  });
}

document.getElementById('addExperience').addEventListener('click', () => {
  state.experiences.push({ id: uid(), title: '', company: '', start: '', end: '', desc: '' });
  renderExperienceForms();
  renderPreview();
});

document.getElementById('addEducation').addEventListener('click', () => {
  state.educations.push({ id: uid(), degree: '', institution: '', year: '' });
  renderEducationForms();
  renderPreview();
});

// Delegated input/click for dynamic entries
document.getElementById('experienceList').addEventListener('input', e => {
  const id = e.target.dataset.exp;
  const field = e.target.dataset.field;
  if (!id || !field) return;
  const exp = state.experiences.find(x => x.id === id);
  if (exp) { exp[field] = e.target.value; renderPreview(); }
});
document.getElementById('experienceList').addEventListener('click', e => {
  const btn = e.target.closest('[data-remove-exp]');
  if (!btn) return;
  const id = btn.dataset.removeExp;
  state.experiences = state.experiences.filter(x => x.id !== id);
  renderExperienceForms();
  renderPreview();
});

document.getElementById('educationList').addEventListener('input', e => {
  const id = e.target.dataset.edu;
  const field = e.target.dataset.field;
  if (!id || !field) return;
  const ed = state.educations.find(x => x.id === id);
  if (ed) { ed[field] = e.target.value; renderPreview(); }
});
document.getElementById('educationList').addEventListener('click', e => {
  const btn = e.target.closest('[data-remove-edu]');
  if (!btn) return;
  const id = btn.dataset.removeEdu;
  state.educations = state.educations.filter(x => x.id !== id);
  renderEducationForms();
  renderPreview();
});

// Theme swatches
document.querySelectorAll('.theme-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    state.theme = sw.dataset.theme;
    renderPreview();
  });
});

// Font size
const fontLabel = document.getElementById('fontSizeLabel');
document.getElementById('fontUp').addEventListener('click', () => {
  state.fontSize = Math.min(20, state.fontSize + 1);
  fontLabel.textContent = state.fontSize + 'px';
  renderPreview();
});
document.getElementById('fontDown').addEventListener('click', () => {
  state.fontSize = Math.max(10, state.fontSize - 1);
  fontLabel.textContent = state.fontSize + 'px';
  renderPreview();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Clear all fields and reset the resume?')) return;
  Object.assign(state, {
    fullName:'', jobTitle:'', email:'', phone:'', address:'', summary:'', skills:'',
    experiences: [], educations: [],
  });
  ['fullName','jobTitle','email','phone','address','summary','skills'].forEach(id => {
    document.getElementById(id).value = '';
  });
  renderExperienceForms();
  renderEducationForms();
  renderPreview();
});

// Download PDF
document.getElementById('downloadBtn').addEventListener('click', () => {
  const resume = document.getElementById('resume');
  const name = (state.fullName || 'resume').trim().replace(/\s+/g, '_');
  html2pdf().set({
    margin: 0,
    filename: `${name}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, backgroundColor: getComputedStyle(resume).getPropertyValue('--r-bg') || '#ffffff', useCORS: true },
    jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
  }).from(resume).save();
});

// ---------- Seed with sample content so preview isn't empty ----------
function seed() {
  state.fullName = 'Jane Doe';
  state.jobTitle = 'Senior Product Designer';
  state.email = 'jane.doe@example.com';
  state.phone = '+1 (555) 123-4567';
  state.address = 'San Francisco, CA';
  state.summary = 'Product designer with 8+ years of experience leading end-to-end design for B2B SaaS products. Passionate about building inclusive, data-informed user experiences.';
  state.skills = 'Figma, Design Systems, User Research, Prototyping, HTML/CSS, Leadership';
  state.experiences = [
    { id: uid(), title: 'Senior Product Designer', company: 'Acme Inc.', start: 'Jan 2022', end: 'Present',
      desc: 'Led redesign of core dashboard, lifting activation by 27%\nBuilt design system adopted by 4 product teams\nMentored 3 junior designers' },
    { id: uid(), title: 'Product Designer', company: 'Globex', start: 'Jun 2019', end: 'Dec 2021',
      desc: 'Shipped onboarding revamp reducing churn by 18%\nPartnered with research on 20+ usability studies' },
  ];
  state.educations = [
    { id: uid(), degree: 'B.A. Human-Computer Interaction', institution: 'University of Washington', year: '2018' },
  ];

  document.getElementById('fullName').value = state.fullName;
  document.getElementById('jobTitle').value = state.jobTitle;
  document.getElementById('email').value = state.email;
  document.getElementById('phone').value = state.phone;
  document.getElementById('address').value = state.address;
  document.getElementById('summary').value = state.summary;
  document.getElementById('skills').value = state.skills;
}

// ---------- Init ----------
bindStaticInputs();
seed();
renderExperienceForms();
renderEducationForms();
renderPreview();
</script>
</body>
</html>
